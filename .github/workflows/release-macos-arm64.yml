name: Release macOS ARM64

on:
  push:
    tags:
      - 'macos-arm64-v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: setup macOS keychain
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          # 创建临时钥匙串
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 导入证书（包含私钥的 .p12）
          (echo "${{ secrets.APPLE_CERTIFICATE }}" | base64 --decode > certificate.p12) || (echo "${{ secrets.APPLE_CERTIFICATE }}" | base64 -D > certificate.p12)
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign -A

          # 重要：设置钥匙串分区列表，授予 codesign 访问权限
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 将钥匙串添加到搜索列表，并设为默认钥匙串
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          # 列出身份确认导入成功
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # 校验：必须至少有一个可用的 codesigning identity，并且与 APPLE_SIGNING_IDENTITY 匹配
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "\".*\"" || (echo "No valid code signing identities found. Ensure the .p12 includes the private key." && exit 1)
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -Fq "${{ secrets.APPLE_SIGNING_IDENTITY }}" || (echo "APPLE_SIGNING_IDENTITY not found in imported keychain identities." && exit 1)

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: install dependencies
        run: pnpm install

      - name: build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: waliapi-v__VERSION__
          releaseName: 'WaLiAPI v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: '--target aarch64-apple-darwin'
